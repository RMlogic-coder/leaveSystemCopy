<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="/css/previous_app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="dashboard">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="/Images/HorizontalWhite.png" alt="Logo" class="logo">
                <button class="close-btn" onclick="toggleSidebar()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <nav>
                <a href="/pages/student/student.html" style="text-decoration: none;">

                    <i class="fa-solid fa-gauge"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/pages/student/apply_leave.html" style="text-decoration: none;">
                    <i class="fa-solid fa-users"></i>
                    <span>Apply Leave</span>
                </a>
                <a class="active" >
                    <i class="fa-solid fa-file-lines"></i>
                    <span>My Applications</span>
                </a>
                <a>
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </a>
                <a class="logout" href="/index.html" onclick="sessionStorage.clear()">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main -->
        <main class="main">

            <!-- Topbar -->
            <header class="topbar">

                <button class="menu-btn" onclick="toggleSidebar()">☰</button>

                <div class="topbar-center">
                    <h3>Previous Application</h3>
                </div>

                <div class="topbar-right">
                    <div class="profile">Student</div>
                </div>

            </header>


            <!-- Content -->
            <section class="content">
                <div class="content-wrapper">

                    <div class="table-wrapper">
                        <table class="client-table">
                            <thead>
                                <tr>
                                    <th>Index</th>
                                    <th>Full Name</th>
                                    <th>Roll Number</th>
                                    <th>Start Date</th>
                                    <th>End Date</th>
                                    <th>Total Days</th>
                                    <th>Mess Refund (₹)</th>
                                    <th>Phone</th>
                                    <th>Reason</th>
                                    <th>Status</th>
                                    <th>Refund Status</th>
                                </tr>
                            </thead>

                            <tbody id="clientTableBody">
                                <!-- Rows will be injected from DB / CSV -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/js/prev_app_logic.js"></script>


</body>

</html>
