    <!DOCTYPE html>

    <html>

    <head>
        <title>Test Update</title>
    </head>

    <body>

        ```
        <h2>Update Student Name</h2>

        <input type="number" id="id" placeholder="Student ID"><br><br>
        <input type="text" id="name" placeholder="New Name"><br><br>

        <button onclick="updateStudent()">Update</button>

        <p id="result"></p>

        <script>
            async function updateStudent() {
                const id = document.getElementById("id").value;
                const name = document.getElementById("name").value;

                const res = await fetch("http://localhost:3000/update-student", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ id, name })
                });

                const data = await res.json();

                document.getElementById("result").innerText = data.message || data.error;
            }
        </script>
        ```

    </body>
