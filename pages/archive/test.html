<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leave & Mess Refund Application</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/css/test.css">
</head>
<body>

<div class="form-container">
    <h2>Leave & Mess Refund Application</h2>

    <form>
        <!-- Student Info -->
        <label>Student Name</label>
        <input type="text" value="Rishi Manchanda" readonly>

        <label>Roll Number</label>
        <input type="text" value="20CS1234" readonly>

        <!-- Parent Phone Selection -->
        <label>Select Parent Mobile Number</label>
        <div class="phone-box">
            <label>
                <input type="radio" name="parent_phone" required>
                Father – 9876543210
            </label>
            <label>
                <input type="radio" name="parent_phone">
                Mother – 9123456780
            </label>
        </div>

        <!-- Mess -->
        <label>Mess Name</label>
        <select required>
            <option value="">Select Mess</option>
            <option>Mess A</option>
            <option>Mess B</option>
        </select>

        <!-- Leave Dates -->
        <label>Leave Start Date</label>
        <input type="date" id="startDate" required>

        <label>Leave End Date</label>
        <input type="date" id="endDate" required>

        <!-- Auto Days -->
        <label>Total Leave Days</label>
        <input type="number" id="totalDays" readonly>

        <!-- Status -->
        <button type="submit" class="btn">Submit Application</button>
    </form>
</div>

<!-- JS -->
<script src="/js/leaveform.js"></script>
</body>
</html>
