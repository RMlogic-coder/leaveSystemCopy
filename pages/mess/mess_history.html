<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mess History</title>
    <link rel="stylesheet" href="/css/style_mess_dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="dashboard">

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="/Images/HorizontalWhite.png" alt="Logo" class="logo">
                <button class="close-btn" onclick="toggleSidebar()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <nav>
                <a href="/pages/mess/mess_dashboard.html">
                    <i class="fa-solid fa-gauge"></i>
                    <span>Dashboard</span>
                </a>
                <a class="active" href="/pages/mess/mess_history.html">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    <span>History</span>
                </a>
                <a>
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </a>
                <a class="logout" href="/index.html" onclick="sessionStorage.clear()">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <main class="main">
            <header class="topbar">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <div class="topbar-center">
                    <h3>Mess Refund History</h3>
                </div>
                <div class="topbar-right">
                    <div class="profile">Mess Office</div>
                </div>
            </header>

            <section class="content">
                <div class="content-wrapper">

                    <div class="cards">
                        <div class="card">
                            <h4>Total Processed</h4>
                            <p id="totalProcessed">0</p>
                        </div>
                        <div class="card">
                            <h4>Total Refunded Amount</h4>
                            <p id="totalRefundedAmount">₹0</p>
                        </div>
                        <div class="card">
                            <h4>No Refund Cases</h4>
                            <p id="noRefundCount">0</p>
                        </div>
                    </div>

                    <div class="filter-bar">
                        <button class="filter-btn active-filter" onclick="setFilter('all', this)">
                            <i class="fa-solid fa-list"></i> All
                        </button>
                        <button class="filter-btn" onclick="setFilter('Refunded', this)">
                            <i class="fa-solid fa-circle-check"></i> Refunded
                        </button>
                        <button class="filter-btn" onclick="setFilter('No Refund', this)">
                            <i class="fa-solid fa-ban"></i> No Refund
                        </button>
                        <button class="filter-btn" onclick="setFilter('Processing', this)">
                            <i class="fa-solid fa-hourglass-half"></i> Processing
                        </button>
                    </div>

                    <div class="table-section">
                        <h3 class="section-title">
                            <i class="fa-solid fa-clock-rotate-left"></i>
                            Refund History
                        </h3>

                        <div class="table-wrapper">
                            <table class="client-table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Name</th>
                                        <th>Roll Number</th>
                                        <th>Semester</th>
                                        <th>Days</th>
                                        <th>Amount</th>
                                        <th>Destination</th>
                                        <th>Status</th>
                                        <th>Processed At</th>
                                    </tr>
                                </thead>
                                <tbody id="historyTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/js/mess_history.js"></script>
</body>

</html>
