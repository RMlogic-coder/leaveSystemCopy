<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="/css/style_student.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="dashboard">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="/Images/HorizontalWhite.png" alt="Logo" class="logo">
                <button class="close-btn" onclick="toggleSidebar()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <nav>
                <a class="active">

                    <i class="fa-solid fa-gauge"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/pages/student/apply_leave.html" style="text-decoration: none;">
                    <i class="fa-solid fa-users"></i>
                    <span>Apply Leave</span>
                </a>
                <a href="/pages/archive/previous_app.html" style="text-decoration: none;">
                    <i class="fa-solid fa-file-lines"></i>
                    <span>My Applications</span>
                </a>
                <a>
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </a>
                <a class="logout" href="/index.html" onclick="sessionStorage.clear()">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main -->
        <main class="main">

            <!-- Topbar -->
            <header class="topbar">

                <button class="menu-btn" onclick="toggleSidebar()">☰</button>

                <div class="topbar-center">
                    <h3>Dashboard</h3>
                </div>

                <div class="topbar-right">
                    <div class="profile">Student</div>
                </div>

            </header>


            <!-- Content -->
            <section class="content">
                <div class="content-wrapper">
                    <div class="top-actions">
                        <a href="/pages/student/apply_leave.html" style="text-decoration: none;"> <button class="apply-leave-btn">Apply
                                Leave</button></a>
                        <a href="/pages/archive/previous_app.html" style="text-decoration: none;"> <button class="prev-app-btn">My
                                Applications</button></a>
                    </div>


                    <div class="cards">
                        <div class="card">
                            <h4>Your Hostel</h4>
                            <p id="hostelName">--</p>
                        </div>

                        <div class="card">
                            <h4>Pending Refunds</h4>
                            <p id="pendingRefundValue">--</p>
                        </div>

                        <div class="card">
                            <h4>Your Faculty Advisor</h4>
                            <p id="yourFA">--</p>
                        </div>
                    </div>

                    <div class="longcards">
                        <h4 style="font-size: 2rem; text-align: center;">Leave Form</h4>

                        <form id="leaveForm">
                            <label>Student Name</label>
                            <input type="text" id="studentName" value="" readonly>

                            <label>Roll Number</label>
                            <input type="text" id="rollNumber" value="" readonly>
                            <div class="field">
                                <label>Select Parent Mobile Number</label>
                                <label>Mess Name</label>
                                <select id="parentPhone" required>
                                    <option value="">Phone number</option>
                                </select>


                                <input type="text" id="messName" value="" readonly>

                            </div>
                            <div class="field">
                                <label>Leave Start Date</label>
                                <label>Leave End Date</label>
                                <input type="date" id="startDate" required>
                                <input type="date" id="endDate" required>
                            </div>
                            <label>Total Leave Days</label>
                            <input type="number" id="totalDays" readonly>

                            <label>Reason for Leave</label>
                            <textarea id="leaveReason" rows="3" placeholder="Enter reason for leave…" required
                                style="width:100%; resize:vertical; padding: 0 7px;"></textarea>

                            <p id="formMessage" style="font-size:13px; margin-top:8px; display:none;"></p>

                            <button type="submit" class="btn">Submit Application</button>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/js/leaveform.js"></script>


</body>

</html>
