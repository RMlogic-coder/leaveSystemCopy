<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave system IIITR</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Gravitas+One&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="login">
        <h1>User Login</h1>

        <form id="loginForm" onsubmit="return handleLogin(event)">

            <input type="text" id="Username" name="Username" placeholder="Username" required><br>
            <input type="password" id="Password" name="Password" placeholder="Password" required><br>
            <select id="Role" name="Role" required style="    width: 100%;
    padding: 12px 15px;
    height: 45px;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.25);
    background: rgba(255, 255, 255, 0.1);
    color: #fff;

    outline: none;
    transition: all 0.3s ease;">
                <option value="auto" selected>Auto Detect Role</option>
                <!-- <option value="student">Student</option> -->
                <option value="warden">Warden</option>
                <option value="fa">Faculty Advisor</option>
                <option value="mess">Mess</option>
                <option value="admin">Admin</option>
            </select><br>
        </form>
        <p id="loginError" style="color:#ffffff; font-size:13px; margin-top:8px; display:none;"></p>
        <div class="btn-wrapper">
            <button class="btn btn-filled" onclick="handleLogin(event)">Login</button>
        </div>
        <div class="credentials-hint"
            style="margin-top:18px; font-size:12px; color:#aaa; text-align:left; line-height:1.8;">
            <p style="color:#5da6c5; font-weight:600; margin-bottom:4px;">Demo Credentials:</p>
            <p><b>Student:</b> Roll Number / 1234 (CS25B1034 / 1234)</p>
            <p><b>Warden:</b> Warden ID / 1234 (NBV101 / 1234)</p>
            <p><b>FA:</b> FA ID / 1234 (BS101 / 1234)</p>
            
            <p><b>Mess:</b> mess / mess123</p>
            <p><b>Admin:</b> admin / admin123</p>
        </div>
        <div class="forget-password"><a href="#">Forget Password</a></div>
    </div>

    <script>
        function isLikelyRollNumber(value) {
            return /^[A-Z]{2,4}\d{2}[A-Z]\d{3,4}$/i.test(String(value || "").trim());
        }

        async function handleLogin(e) {
            e.preventDefault();

            const roleSelection = document.getElementById("Role").value;
            const usernameRaw = document.getElementById("Username").value.trim();
            const password = document.getElementById("Password").value;
            const errEl = document.getElementById("loginError");

            try {
                const res = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username: usernameRaw,
                        password,
                        roleSelection
                    })
                });

                const json = await res.json();
                if (!res.ok) {
                    errEl.textContent = json.error || "Invalid credentials for selected role.";
                    errEl.style.display = "block";
                    return false;
                }

                errEl.style.display = "none";
                const session = json.session || {};
                sessionStorage.setItem("loggedInUser", JSON.stringify(session));
                window.location.href = json.redirect || "/index.html";
            } catch (error) {
                console.error("Login failed:", error);
                errEl.textContent = "Network error. Please try again.";
                errEl.style.display = "block";
            }

            return false;
        }
    </script>

</body>

</html>
